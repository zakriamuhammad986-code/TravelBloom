<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelBloom</title>

    <!-- CSS File -->
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome for Social Media Icons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <!-- Navigation Bar -->
    <nav class="navbar">

        <div class="logo">
            <h2>🌍 TravelBloom</h2>
        </div>

        <ul class="nav-links">
            <li><a href="travel_bloom.html">Home</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>

        <div class="search-container">
            <input
                type="text"
                id="searchInput"
                placeholder="Enter a destination or keyword">

            <button id="searchBtn">Search</button>

            <button id="resetBtn">Reset</button>
        </div>

    </nav>

    <!-- Hero Section -->
    <section class="hero">

        <div class="hero-content">

            <h1>
                EXPLORE <br>
                DREAM <br>
                DESTINATION
            </h1>

            <p>
                Discover beautiful beaches, famous temples, exciting cities,
                and breathtaking destinations around the world. TravelBloom
                helps you find your perfect travel experience with personalized
                recommendations.
            </p>

            <button class="book-btn">
                BOOK NOW
            </button>

        </div>

        <!-- Social Media Icons -->
        <div class="social-icons">

            <a href="#"><i class="fab fa-facebook-f"></i></a>

            <a href="#"><i class="fab fa-instagram"></i></a>

            <a href="#"><i class="fab fa-twitter"></i></a>

            <a href="#"><i class="fab fa-youtube"></i></a>

        </div>

    </section>

    <!-- Recommendation Results -->
    <section id="recommendation-results">

    </section>

    <!-- JavaScript -->
    <script src="travel_bloom.js"></script>

</body>
</html>
